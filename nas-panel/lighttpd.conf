# CLIO NAS admin panel — minimal lighttpd config (stretch 1.4.45).
# Original distro config preserved at lighttpd.conf.orig.
server.modules = (
	"mod_access",
	"mod_auth",
	"mod_cgi",
)

server.document-root = "/usr/local/nas-panel/www"
server.errorlog      = "/var/log/lighttpd/error.log"
server.pid-file      = "/var/run/lighttpd.pid"
server.username      = "www-data"
server.groupname     = "www-data"
server.port          = 80
# also listen on IPv6 (eth0 has global v6; WSL/mDNS may resolve to it)
$SERVER["socket"] == "[::]:80" { }

index-file.names = ( "index.cgi" )

# never serve helper libs or dotfiles
url.access-deny = ( "~", ".sh", ".inc" )

cgi.assign = ( ".cgi" => "" )

auth.backend = "htdigest"
auth.backend.htdigest.userfile = "/etc/lighttpd/nas-panel.htdigest"
auth.require = ( "/" =>
	( "method" => "digest", "realm" => "CLIO NAS", "require" => "valid-user" )
)

mimetype.assign = (
	".html" => "text/html",
	".css"  => "text/css",
	".txt"  => "text/plain",
)
