# Match WD stock module params. disable_wifi_offload=1 is critical: without it the
# PFE enables the VWD/wifi-offload datapath which diverts host-bound traffic
# (incl. inbound broadcast/ARP) away from eth0's Linux stack -> box unreachable.
options pfe lro_mode=1 tx_qos=1 alloc_on_init=1 disable_wifi_offload=1
